name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Pack packages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p /tmp/packs
          for pkg in packages/tui packages/ai packages/agent packages/coding-agent; do
            cd "$pkg"
            npm pack --pack-destination /tmp/packs
            cd "$GITHUB_WORKSPACE"
          done
          cd /tmp/packs
          for f in *.tgz; do
            stable=$(echo "$f" | sed 's/-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tgz/.tgz/')
            mv "$f" "$stable"
          done

      - name: Upload to rolling release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha_lines=""
          for f in /tmp/packs/*.tgz; do
            name=$(basename "$f")
            hash=$(openssl dgst -sha512 -binary "$f" | base64 -w0)
            sha_lines="${sha_lines}"$'\n'"https://github.com/CGamesPlay/pi/releases/download/latest/${name}#sha512-${hash}"
          done
          notes="Rolling release — updated on every push to main.${sha_lines}"
          gh release create latest \
            --title "Latest Build" \
            --notes "$notes" \
            --prerelease \
            /tmp/packs/*.tgz \
            2>/dev/null || (\
          gh release upload latest \
            /tmp/packs/*.tgz \
            --clobber && \
          gh release edit latest --notes "$notes")
